<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2F3640" />

    <!-- Phase 6 D-24: SEO description (same text as og:description per D-24) -->
    <meta name="description" content="ВИГОДА — забудовник у Львові. Lakeview у будівництві (здача 2027), Етно Дім та ще три — на стадії дозволів і кошторисів. ЄДРПОУ 42016395." />

    <!-- Phase 6 D-21: Open Graph meta — locked values verbatim. HashRouter
         forces global meta (D-20); per-route OG is v2 (BrowserRouter at
         custom domain INFR2-03). -->
    <meta property="og:title" content="ВИГОДА — Львівський забудовник. 1 ЖК у будівництві, 4 у розробці." />
    <meta property="og:description" content="ВИГОДА — забудовник у Львові. Lakeview у будівництві (здача 2027), Етно Дім та ще три — на стадії дозволів і кошторисів. ЄДРПОУ 42016395." />
    <meta property="og:url" content="https://yaroslavpetrukha.github.io/vugoda-website/" />
    <meta property="og:image" content="https://yaroslavpetrukha.github.io/vugoda-website/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Логотип ВИГОДА на темному фоні, акцентний куб." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="uk_UA" />
    <meta property="og:site_name" content="ВИГОДА" />

    <!-- Phase 6 D-22: Twitter Card. Site/creator @handle meta intentionally
         omitted — no Twitter handle exists in v1; placeholders would be lying. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ВИГОДА — Львівський забудовник. 1 ЖК у будівництві, 4 у розробці." />
    <meta name="twitter:description" content="ВИГОДА — забудовник у Львові. Lakeview у будівництві (здача 2027), Етно Дім та ще три — на стадії дозволів і кошторисів. ЄДРПОУ 42016395." />
    <meta name="twitter:image" content="https://yaroslavpetrukha.github.io/vugoda-website/og-image.png" />
    <meta name="twitter:image:alt" content="Логотип ВИГОДА на темному фоні, акцентний куб." />

    <!-- Phase 6 D-23: canonical URL — production root only (HashRouter forces
         single canonical). v2 BrowserRouter opens per-route. -->
    <link rel="canonical" href="https://yaroslavpetrukha.github.io/vugoda-website/" />

    <!-- Favicon stack: SVG primary (Phase 1 D-24) + PNG fallbacks (Phase 6 D-25).
         apple-touch-icon (180×180) + favicon-32 PNG generated by
         scripts/build-og-image.mjs from brand-assets/favicon/favicon-32.svg
         at build time. -->
    <link rel="icon" type="image/svg+xml" href="/vugoda-website/favicon.svg" />
    <link rel="apple-touch-icon" href="/vugoda-website/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/vugoda-website/favicon-32.png" />

    <!-- Phase 6 D-13: hero preload limited to [640w, 1280w]. The 1920w
         variant remains available for retina selection in <picture>'s
         <source srcset> (Hero.tsx Phase 3) — that path is single-resolution-
         per-DPR and does NOT double-fetch. Stripping 1920w from the preload
         alone fixes the DPR=1 double-fetch waste documented in audit. -->
    <link
      rel="preload"
      as="image"
      imagesrcset="/vugoda-website/renders/lakeview/_opt/aerial-640.avif 640w, /vugoda-website/renders/lakeview/_opt/aerial-1280.avif 1280w"
      imagesizes="(min-width: 1280px) 768px, 100vw"
      type="image/avif"
      fetchpriority="high"
    />
    <title>ВИГОДА — Львівський забудовник</title>

    <!-- P1-UX1 SPA fallback decoder (rafgraph/spa-github-pages, MIT).
         Pairs with public/404.html: GH Pages serves 404.html on deep-link
         miss → its script encodes the path into ?/ and redirects → this
         decoder restores the clean URL via history.replaceState before
         the React bundle below initializes BrowserRouter. Idempotent:
         no-op when location.search does not start with '?/'. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
